<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>태플릭스 - 현재 상영 중</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- 헤더 -->
<header id="header">
  <div class="logo">태플릭스</div>
  <div class="header-right">현재 상영 중</div>
</header>

<!-- 히어로 배너 -->
<section id="hero">
  <div id="hero-backdrop"></div>
  <div class="hero-info">
    <div class="hero-title" id="hero-title">로딩 중...</div>
    <div class="hero-meta">
      <span class="hero-rating" id="hero-rating"></span>
      <span class="hero-date" id="hero-date"></span>
    </div>
    <div class="hero-overview" id="hero-overview"></div>
    <button class="hero-btn btn-play" id="hero-btn">▶ 자세히 보기</button>
  </div>
</section>

<!-- 영화 그리드 -->
<main id="main-content">
  <div id="loading">
    <div class="spinner"></div>
    <p>영화를 불러오는 중...</p>
  </div>
  <div id="error-msg">
    <h2>오류가 발생했습니다</h2>
    <p id="error-detail"></p>
  </div>
  <div id="movies-section" style="display:none">
    <div class="section-title">현재 상영 중인 영화</div>
    <div class="movie-grid" id="movie-grid"></div>
  </div>
</main>

<!-- 모달 -->
<div id="modal-overlay">
  <div id="modal">
    <img id="modal-backdrop" src="" alt="" />
    <button id="modal-close">✕</button>
    <div id="modal-body">
      <div id="modal-title"></div>
      <div id="modal-meta"></div>
      <div id="modal-overview"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
